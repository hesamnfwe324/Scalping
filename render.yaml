services:
  - type: web
    name: goldscalper-v4-robot
    runtime: python
    plan: starter
    healthCheckPath: /health
    buildCommand: pip install -r live_trading/requirements.txt
    startCommand: python live_trading/server.py
    envVars:
      - key: METAAPI_TOKEN
        sync: false
      - key: METAAPI_ACCOUNT_ID
        sync: false
      - key: SYMBOL
        value: XAUUSD
      - key: RISK_PERCENT
        value: "1.0"
      - key: MIN_CONFIRMATIONS
        value: "3"
      - key: DAILY_LOSS_LIMIT_PCT
        value: "3.0"
      - key: MAX_DRAWDOWN_PCT
        value: "8.0"
      - key: SLIPPAGE_POINTS
        value: "30"
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: STATE_FILE
        value: "/data/robot_state.json"
      - key: MT5_SNAPSHOT
        value: "/data/robot_mt5_snapshot.json"
      - key: COMMANDS_FILE
        value: "/data/robot_commands.json"
      - key: GUARDIAN_STATE_FILE
        value: "/data/guardian_state.json"
      - key: LOG_FILE
        value: "/data/robot.log"
      - key: REDIS_URL
        fromService:
          name: goldscalper-redis
          type: redis
          property: connectionString
    disk:
      name: robot-data
      mountPath: /data
      sizeGB: 1

  - type: web
    name: goldscalper-v4-panel
    runtime: python
    plan: starter
    healthCheckPath: /health
    buildCommand: pip install -r telegram_panel/requirements.txt
    startCommand: python telegram_panel/server.py
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_OWNER_ID
        sync: false
      - key: PANEL_ENCRYPTION_KEY
        sync: false
      - key: TELEGRAM_ADMIN_IDS
        value: ""
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: PANEL_DB_PATH
        value: "/data/panel.db"
      - key: LOG_LEVEL
        value: "INFO"
      - key: REDIS_URL
        fromService:
          name: goldscalper-redis
          type: redis
          property: connectionString
    disk:
      name: panel-data
      mountPath: /data
      sizeGB: 1

  - type: redis
    name: goldscalper-redis
    plan: free
    maxmemoryPolicy: noeviction
    ipAllowList: []
