services:
  - type: web
    name: goldscalper-v4-robot
    runtime: python
    plan: free
    healthCheckPath: /health
    buildCommand: pip install -r live_trading/requirements.txt
    startCommand: python live_trading/server.py
    envVars:
      # ── MT5 broker connection (via mtapi.io bridge) ──────────────────────
      - key: MTAPI_URL
        value: "https://goldscalper-mtapi.onrender.com"
      - key: MT5_HOST
        value: "AMarkets-Demo"
      - key: MT5_PORT
        value: "443"
      - key: MT5_USER
        sync: false
      - key: MT5_PASSWORD
        sync: false
      # ── Symbol & strategy ────────────────────────────────────────────────
      - key: SYMBOL
        value: XAUUSD
      - key: RISK_PERCENT
        value: "1.0"
      - key: MIN_CONFIRMATIONS
        value: "3"
      # ── Risk Guardian circuit breakers ───────────────────────────────────
      - key: DAILY_LOSS_LIMIT_PCT
        value: "3.0"
      - key: MAX_DRAWDOWN_PCT
        value: "8.0"
      - key: SLIPPAGE_POINTS
        value: "30"
      # ── Runtime ─────────────────────────────────────────────────────────
      - key: PYTHON_VERSION
        value: "3.11.0"
      # ── State files ──────────────────────────────────────────────────────
      - key: STATE_FILE
        value: "/tmp/robot_state.json"
      - key: MT5_SNAPSHOT
        value: "/tmp/robot_mt5_snapshot.json"
      - key: COMMANDS_FILE
        value: "/tmp/robot_commands.json"
      - key: GUARDIAN_STATE_FILE
        value: "/tmp/guardian_state.json"
      - key: LOG_FILE
        value: "/tmp/robot.log"
      # ── Redis IPC (set from Render Redis service) ─────────────────────────
      - key: REDIS_URL
        value: ""

  - type: web
    name: goldscalper-v4-panel
    runtime: python
    plan: free
    healthCheckPath: /health
    buildCommand: pip install -r telegram_panel/requirements.txt
    startCommand: python telegram_panel/server.py
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_OWNER_ID
        sync: false
      - key: PANEL_ENCRYPTION_KEY
        sync: false
      - key: TELEGRAM_ADMIN_IDS
        value: ""
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: PANEL_DB_PATH
        value: "/tmp/panel.db"
      - key: LOG_LEVEL
        value: "INFO"
      - key: REDIS_URL
        value: ""
