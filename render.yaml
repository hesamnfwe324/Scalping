services:
  - type: web
    name: goldscalper-v4-robot
    runtime: python
    plan: free
    healthCheckPath: /health
    buildCommand: pip install -r live_trading/requirements.txt
    startCommand: python live_trading/server.py
    envVars:
      - key: METAAPI_TOKEN
        sync: false
      - key: METAAPI_ACCOUNT_ID
        sync: false
      - key: SYMBOL
        value: XAUUSD
      - key: RISK_PERCENT
        value: "1.0"
      - key: MIN_CONFIRMATIONS
        value: "3"
      - key: DAILY_LOSS_LIMIT_PCT
        value: "3.0"
      - key: MAX_DRAWDOWN_PCT
        value: "8.0"
      - key: SLIPPAGE_POINTS
        value: "30"
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: STATE_FILE
        value: "robot_state.json"
      - key: MT5_SNAPSHOT
        value: "robot_mt5_snapshot.json"
      - key: COMMANDS_FILE
        value: "robot_commands.json"
      - key: LOG_FILE
        value: "live_trading/robot.log"

  - type: web
    name: goldscalper-v4-panel
    runtime: python
    plan: free
    healthCheckPath: /health
    buildCommand: pip install -r telegram_panel/requirements.txt
    startCommand: python telegram_panel/server.py
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_OWNER_ID
        sync: false
      - key: PANEL_ENCRYPTION_KEY
        sync: false
      - key: TELEGRAM_ADMIN_IDS
        value: ""
      - key: PYTHON_VERSION
        value: "3.11.0"
