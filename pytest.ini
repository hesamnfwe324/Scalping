[pytest]
# GoldScalperPro v4 — pytest configuration
# Run from the project root:  pytest tests/ -v
#
# pythonpath makes `live_trading` and `telegram_panel` importable
# without needing `pip install -e .` or manual sys.path manipulation.
pythonpath = .
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
